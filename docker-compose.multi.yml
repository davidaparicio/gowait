# Overlay that runs TWO gowait replicas behind an nginx load balancer,
# sharing the Valkey store — one waiting room, no single point of failure:
#
#   docker compose -f docker-compose.yml -f docker-compose.valkey.yml \
#                  -f docker-compose.multi.yml up --build
#
# Kill a replica (docker kill gowait-gowait-1) and waiters keep their place.
services:
  lb:
    image: nginx:1.29-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gowait

  gowait:
    deploy:
      replicas: 2
    # The LB owns the host port now.
    ports: !reset []
