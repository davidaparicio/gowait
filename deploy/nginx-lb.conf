# Load balancer for the multi-replica compose demo. Resolving "gowait"
# through Docker's embedded DNS (127.0.0.11) with a short TTL makes nginx
# spread requests across all replicas and notice replacements — the variable
# in proxy_pass forces per-request resolution.
server {
    listen 80;

    location / {
        resolver 127.0.0.11 valid=5s;
        set $upstream http://gowait:8080;
        proxy_pass $upstream;
        # Fail over fast when a replica dies (its IP lingers in DNS ~5s).
        proxy_connect_timeout 2s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        # WebSocket/SSE passthrough
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_buffering off;
    }
}
