apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gowait
  # Uncomment and adjust for your ingress controller / TLS setup. Remember to
  # set GOWAIT_COOKIE_SECURE=true in the ConfigMap once TLS terminates here.
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt
spec:
  rules:
    - host: gowait.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gowait
                port:
                  name: http
