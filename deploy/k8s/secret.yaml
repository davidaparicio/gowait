apiVersion: v1
kind: Secret
metadata:
  name: gowait-secrets
type: Opaque
stringData:
  # REQUIRED with multiple replicas: they must share one signing key.
  # Generate with: openssl rand -hex 32
  GOWAIT_COOKIE_SECRET: change-me-shared-hmac-secret
  # Optional: enables queue bypass and the /gowait/admin API.
  GOWAIT_ADMIN_KEY: change-me-admin-key
