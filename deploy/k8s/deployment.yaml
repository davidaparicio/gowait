apiVersion: apps/v1
kind: Deployment
metadata:
  name: gowait
  labels:
    app: gowait
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gowait
  template:
    metadata:
      labels:
        app: gowait
    spec:
      securityContext:
        runAsNonRoot: true
        # distroless:nonroot declares its user by name; kubelet needs the
        # numeric uid to verify runAsNonRoot.
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gowait
          image: ghcr.io/davidaparicio/gowait:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: gowait-config
            - secretRef:
                name: gowait-secrets
          readinessProbe:
            httpGet:
              path: /gowait/healthz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /gowait/healthz
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
